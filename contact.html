<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Gain | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="contact">
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">Brain Gain</a>
      <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav" id="navMenu">
        <a href="index.html" data-nav="home">Home</a>
        <a href="about.html" data-nav="about">About Us</a>
        <a href="challenges.html" data-nav="challenges">Daily Challenge</a>
        <a href="contact.html" data-nav="contact">Contact Us</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Contact Us</h1>
        <p>Have feedback, a challenge idea, or a question? Send it through the form below.</p>
        <p class="eyebrow">💌 We would love to hear from you.</p>
      </div>
    </section>

    <section class="section">
      <div class="container form-width">
        <form class="card contact-form" id="contactForm">
          <div class="form-grid two-col">
            <div class="field">
              <label for="firstName">First Name *</label>
              <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="field">
              <label for="lastName">Last Name *</label>
              <input type="text" id="lastName" name="lastName" required>
            </div>
          </div>

          <div class="form-grid two-col">
            <div class="field">
              <label for="gender">Gender *</label>
              <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="prefer-not-to-say">Prefer not to say</option>
              </select>
            </div>
            <div class="field">
              <label for="mobile">Mobile *</label>
              <input type="tel" id="mobile" name="mobile" inputmode="numeric" maxlength="10" pattern="05[0-9]{8}" placeholder="05XXXXXXXX" required>
            </div>
          </div>

          <div class="form-grid two-col">
            <div class="field">
              <label for="dateOfBirth">Date of Birth *</label>
              <input type="date" id="dateOfBirth" name="dateOfBirth" required>
            </div>
            <div class="field">
              <label for="email">Email *</label>
              <input type="email" id="email" name="email" required>
            </div>
          </div>

          <div class="field">
            <label for="language">Preferred Language *</label>
            <select id="language" name="language" required>
              <option value="">Select Language</option>
              <option value="english">English</option>
              <option value="arabic">Arabic</option>
              <option value="spanish">Spanish</option>
              <option value="french">French</option>
            </select>
          </div>

          <div class="field">
            <label for="message">Message *</label>
            <textarea id="message" name="message" rows="6" placeholder="Share your feedback or your challenge idea..." required></textarea>
          </div>

          <button type="submit" class="btn submit-btn">Submit</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© 2026 Brain Gain</p>
      <p>Build better habits, one day at a time</p>
    </div>
  </footer>

  <script type="module" src="contact.js"></script>
  <script src="script.js"></script>
  
</body>
</html>
