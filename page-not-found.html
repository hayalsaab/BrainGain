<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Gain | Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .not-found-page {
      min-height: calc(100vh - 78px);
      display: grid;
      place-items: center;
      padding: 72px 16px;
    }
    .not-found-card {
      width: min(520px, 100%);
      text-align: center;
    }
    .not-found-card h1 {
      font-size: clamp(3rem, 12vw, 6rem);
      line-height: 1;
      margin-bottom: 14px;
      background: linear-gradient(90deg, #f25a1f 0%, #f59e0b 55%, #facc15 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .not-found-card h2 {
      color: #2f1f1a;
      margin-bottom: 10px;
    }
    .not-found-card p {
      color: #8b6d62;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <main class="not-found-page">
    <section class="card not-found-card">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you are looking for does not exist. Go back to Brain Gain and keep building better habits.</p>
      <a href="index.html" class="btn primary-btn">Back to Home</a>
    </section>
  </main>
</body>
</html>
